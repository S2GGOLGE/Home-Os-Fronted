<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera Akışları - 3x3 Slot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Css/Camera.css">
    <link rel="stylesheet" href="../Css/modal.css">
    <link rel="icon" href="../İmages/logo.png" type="image/png">
</head>

<body>

    <div id="loader-overlay">
        <div class="loader-ring"></div>
        <div class="loader-title">Home <span>Asistan</span></div>
        <div id="loader-text" class="loader-subtitle">Sistem Başlatılıyor...</div>
        <div class="loader-bar-wrap">
            <div id="loader-bar" class="loader-bar"></div>
        </div>
        <div id="loader-percentage" class="loader-percentage">0%</div>
    </div>

    <div class="header-bar">
        <a href="../index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Geri Dön
        </a>
        <div class="page-title">Kamera Kontrol Merkezi</div>
        <button class="add-header-btn" id="header-add-btn" style="display: none;">
            <i class="fas fa-plus"></i> Kamera Ekle
        </button>
    </div>

    <!-- Empty State (Kamera Yokken Ortada Çıkacak Alan) -->
    <div class="empty-state" id="empty-state" style="display: none;">
        <div class="empty-icon"><i class="fas fa-video-slash"></i></div>
        <h2>Kayıtlı Kamera Bulunmamaktadır</h2>
        <p>Sisteminize henüz bir kamera bağlamadınız. Yeni bir kamera akışı ekleyerek izlemeye başlayın.</p>
        <button class="add-camera-btn" id="empty-add-btn">
            <i class="fas fa-plus"></i> Kamera Ekle
        </button>
    </div>

    <!-- Kamera Izgarası -->
    <div class="camera-grid" id="camera-grid" style="display: none;">
        <!-- Kameralar JS ile buraya yüklenecek -->
    </div>

    <!-- Kamera Ekleme Modalı -->
    <div class="modal-overlay" id="camera-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <div class="modal-header">
                <h2><i class="fas fa-video"></i> Yeni Kamera Ekle</h2>
            </div>
            <form class="modal-form" id="camera-form">
                <div class="form-group">
                    <label for="camera-name-input">Kamera Adı</label>
                    <input type="text" id="camera-name-input" placeholder="Örn: Salon Kamerası" required>
                </div>
                <div class="form-group">
                    <label for="camera-url-input">Akış URL / IP Adresi</label>
                    <input type="text" id="camera-url-input" placeholder="rtsp://192.168.1.50:554/stream1 veya IP adresi" required>
                </div>
                <div class="form-group">
                    <label for="camera-status-select">Durum</label>
                    <select id="camera-status-select">
                        <option value="online">Aktif (Online)</option>
                        <option value="offline">Pasif (Offline)</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancel-btn">İptal</button>
                    <button type="submit" class="btn-primary">Kaydet</button>
                </div>
            </form>
        </div>
    </div>


    <script src="../Js/api-config.js"></script>
    <script src="../Js/Camera.js"></script>
    <script src="../Js/auth.js"></script>
</body>

</html>
